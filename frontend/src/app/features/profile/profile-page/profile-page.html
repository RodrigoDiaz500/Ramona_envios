<div class="profile-page">

  <div class="profile-overlay">

    <div class="profile-card">

      <h1>Mi Perfil</h1>

      <p>Actualiza tu información personal.</p>

      <div *ngIf="loading" class="empty-state">
        Cargando perfil...
      </div>

      <form *ngIf="!loading">

        <div class="form-grid">

          <div class="input-group">
            <input
              type="text"
              placeholder=" "
              [(ngModel)]="user.nombre"
              name="nombre"
              (input)="user.nombre = soloLetras(user.nombre)">

            <label>Nombre</label>
          </div>

          <div class="input-group">
            <input
              type="text"
              placeholder=" "
              [(ngModel)]="user.apellido"
              name="apellido"
              (input)="user.apellido = soloLetras(user.apellido)">

            <label>Apellido</label>
          </div>

          <div class="input-group">
            <input
              type="email"
              placeholder=" "
              [(ngModel)]="user.correo"
              name="correo">

            <label>Correo Electrónico</label>
          </div>

          <div class="input-group">
            <input
              type="text"
              placeholder=" "
              [(ngModel)]="user.telefono"
              name="telefono"
              (input)="user.telefono = formatearTelefono(user.telefono)">

            <label>Teléfono</label>
          </div>

        </div>

        <div class="input-group">
          <input
            type="text"
            placeholder=" "
            [(ngModel)]="user.direccion"
            name="direccion">

          <label>Dirección</label>
        </div>

        <div class="profile-info" *ngIf="usuarioActual">
          <span>Rol actual</span>
          <strong>{{ usuarioActual.rol.nombre }}</strong>
        </div>

        <div class="button-container">

          <button
            type="button"
            class="btn btn-primary"
            (click)="saveProfile()"
            [disabled]="loading">

            Guardar Cambios

          </button>

        </div>

      </form>

    </div>

  </div>

</div>
