<div class="reviews-page">

  <div class="reviews-card">

    <h1>
      Gestión de Reseñas
    </h1>

    <p>
      Opiniones y evaluaciones realizadas por los clientes.
    </p>

    <div
      class="review-item"
      *ngFor="let review of reviews">

      <div class="review-header">

        <div>

          <h3>
            {{ review.shipmentCode }}
          </h3>

          <span class="user">

            {{ review.user }}

          </span>

        </div>

        <span class="date">

          {{ review.date }}

        </span>

      </div>

      <div class="stars">

        <span
          *ngFor="let star of [1,2,3,4,5]">

          {{ star <= review.rating ? '★' : '☆' }}

        </span>

      </div>

      <p class="comment">

        {{ review.comment }}

      </p>

    </div>

  </div>

</div>
