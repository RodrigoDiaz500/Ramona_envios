<div class="shipment-page">

  <div class="shipment-container">

    <div class="shipment-card">

      <h1>Crear Envío</h1>

      <p>Registra una nueva solicitud de envío.</p>

      <form (ngSubmit)="createShipment()">

        <div class="form-grid">

          <div class="input-group">

            <input
              type="text"
              placeholder=" "
              [(ngModel)]="senderName"
              name="senderName"
              [readonly]="esCliente"
              (input)="senderName = soloLetras(senderName)">

            <label>
              Nombre Remitente <span class="required">*</span>
            </label>

          </div>

          <div class="input-group">

            <input
              type="text"
              placeholder=" "
              [(ngModel)]="receiverName"
              name="receiverName"
              (input)="receiverName = soloLetras(receiverName)">

            <label>
              Nombre Destinatario <span class="required">*</span>
            </label>

          </div>

          <div class="input-group">

            <input
              type="text"
              placeholder=" "
              [(ngModel)]="receiverRutDni"
              name="receiverRutDni"
              (input)="receiverRutDni = formatearRut(receiverRutDni)">

            <label>
              RUT / DNI Destinatario <span class="required">*</span>
            </label>

          </div>

          <div class="input-group">

            <input
              type="text"
              placeholder=" "
              [(ngModel)]="receiverPhone"
              name="receiverPhone"
              (input)="receiverPhone = formatearTelefono(receiverPhone)">

            <label>
              Teléfono Destinatario <span class="required">*</span>
            </label>

          </div>

          <div class="input-group select-group">

            <select [(ngModel)]="originBranch" name="originBranch">
              <option value="" disabled>Seleccione sucursal origen</option>

              <option
                *ngFor="let branch of branches"
                [value]="branch.id">
                {{ branch.nombre }} - {{ branch.ciudad }}
              </option>
            </select>

          </div>

          <div class="input-group select-group">

            <select [(ngModel)]="destinationBranch" name="destinationBranch">
              <option value="" disabled>Seleccione sucursal destino</option>

              <option
                *ngFor="let branch of branches"
                [value]="branch.id">
                {{ branch.nombre }} - {{ branch.ciudad }}
              </option>
            </select>

          </div>

          <div class="input-group">

            <input
              type="number"
              placeholder=" "
              [(ngModel)]="weight"
              name="weight">

            <label>
              Peso (kg) <span class="required">*</span>
            </label>

          </div>

          <div class="input-group">

            <input
              type="number"
              placeholder=" "
              [(ngModel)]="declaredValue"
              name="declaredValue">

            <label>
              Valor Declarado <span class="required">*</span>
            </label>

          </div>

        </div>

        <div class="textarea-group">

          <label>Observaciones</label>

          <textarea
            rows="4"
            [(ngModel)]="observations"
            name="observations">
          </textarea>

        </div>

        <div class="button-container">

          <button
            class="btn btn-primary"
            type="submit"
            [disabled]="loading">

            {{ loading ? 'Creando...' : 'Crear Envío' }}

          </button>

        </div>

      </form>

    </div>

  </div>

</div>
