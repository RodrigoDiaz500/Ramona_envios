<div class="shipment-page">

  <div class="shipment-container">

    <div class="shipment-card">

      <h1>
        Crear Envío
      </h1>

      <p>
        Registra una nueva solicitud de envío.
      </p>

      <form>

        <div class="form-grid">

          <div class="input-group">

            <input
              type="text"
              placeholder=" ">

            <label>
              Nombre Remitente
            </label>

          </div>

          <div class="input-group">

            <input
              type="text"
              placeholder=" ">

            <label>
              Nombre Destinatario
            </label>

          </div>

          <div class="input-group">

            <input
              type="text"
              placeholder=" ">

            <label>
              Teléfono Destinatario
            </label>

          </div>

          <div class="input-group">

            <select>
  <option value="" selected disabled>
    Seleccione sucursal origen
  </option>
  <option>Sucursal Central</option>
  <option>San Antonio</option>
  <option>Valparaíso</option>
</select>

          </div>

          <div class="input-group">

            <select>
  <option value="" selected disabled>
    Seleccione sucursal destino
  </option>
  <option>San Antonio</option>
  <option>Valparaíso</option>
  <option>Santiago</option>
</select>
          </div>

          <div class="input-group">

            <input
              type="number"
              placeholder=" ">

            <label>
              Peso (kg)
            </label>

          </div>

        </div>

        <div class="textarea-group">

          <label>
            Observaciones
          </label>

          <textarea
            rows="4">

          </textarea>

        </div>

        <div class="button-container">

          <button
            class="btn btn-primary"
            (click)="createShipment()">

            Crear Envío

          </button>

        </div>

      </form>

    </div>

  </div>

</div>
