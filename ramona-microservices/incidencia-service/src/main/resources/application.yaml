server:
  port: ${SERVER_PORT:8085}
spring:
  application:
    name: incidencia-service
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      connection-timeout: 30000
      validation-timeout: 5000
      idle-timeout: 300000
      max-lifetime: 900000
      keepalive-time: 120000
  jpa:
    database-platform: org.hibernate.dialect.OracleDialect
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
services:
  solicitud:
    url: ${SOLICITUD_SERVICE_URL:http://localhost:8084}
  usuario:
    url: ${USUARIO_SERVICE_URL:http://localhost:8081}
app:
  cors:
    allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:4200}
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
springdoc:
  swagger-ui:
    path: /swagger-ui.html
