server:
  port: ${SERVER_PORT:8084}

spring:
  application:
    name: solicitud-service

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: oracle.jdbc.OracleDriver


    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      connection-timeout: 30000
      validation-timeout: 5000
      idle-timeout: 300000
      max-lifetime: 900000
      keepalive-time: 120000
  jpa:
    database-platform: org.hibernate.dialect.OracleDialect
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  cors:
    allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:4200}

services:
  usuario:
    url: ${USUARIO_SERVICE_URL:http://localhost:8081}
  sucursal:
    url: ${SUCURSAL_SERVICE_URL:http://localhost:8082}
  seguimiento:
    url: ${SEGUIMIENTO_SERVICE_URL:http://localhost:8083}
  notificacion:
    url: ${NOTIFICACION_SERVICE_URL:http://localhost:8087}
